version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://chat:chatpass@postgres:5432/chatdb
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  chat-service:
    build: ./chat-service
    environment:
      DATABASE_URL: postgresql://chat:chatpass@postgres:5432/chatdb
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - chat-service

volumes:
  postgres_data:
